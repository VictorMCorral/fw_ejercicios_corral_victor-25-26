@if(!isAuthenticated){
  <a routerLink="/login" class="btn btn-outline-light btn-sm d-flex align-items-center gap-2">
    <i class="bi bi-person-circle"></i>
      <span>Login</span>
  </a>
} @else {
  <a routerLink="/logout" class="btn btn-outline-light btn-sm d-flex align-items-center gap-2">
    <i class="bi bi-person-circle"></i>
      <span>Logout</span>
  </a>
  }
