<div class="container mt-5">
  <div class="card shadow mx-auto" style="max-width: 800px; border-radius: 15px;">

    <div class="card-header bg-primary text-white py-3" style="border-radius: 15px 15px 0 0;">
      <h2 class="h4 mb-0"><i class="bi bi-journal-bookmark me-2"></i>Detalles de la Receta</h2>
      @if (userMeal()?.saveDate) {
      <div class="small opacity-75 fw-light text-end">
        <i class="bi bi-clock me-1"></i>
        {{ userMeal()?.saveDate | date:'dd/MM/yyyy HH:mm' }}
      </div>
      }
    </div>

    <div class="card-body p-4">
      <div class="row">
        <!-- COLUMNA IZQUIERDA: Se adapta si el objetivo cambia -->
        <div [class]="hecha() ? 'col-md-7 border-end' : 'col-md-12'">
          <div class="mb-4">
            <label class="form-label fw-bold"><i class="bi bi-pencil-square me-1"></i> Anotaciones personales</label>
            <textarea (input)="onNoteChange($event)" [value]="userMeal()?.notes || ''" maxlength="250"
              class="form-control" rows="4" placeholder="¿Algún detalle que apuntar?"></textarea>
          </div>

          <div class="mb-4">
            <div class="btn-group w-100" role="group">
              <!--Hay que mostrar la columna de la derecha solo si "la he hecho" esta marcado-->
              <input (change)="onChangeObjetive(false)" type="radio" class="btn-check" name="obj" id="qHacer"
                autocomplete="off" [checked]="qHacerla()">
              <label class="btn btn-outline-primary" for="qHacer">Quiero hacerla</label>

              <input (change)="onChangeObjetive(true)" type="radio" class="btn-check" name="obj" id="hecha"
                autocomplete="off" [checked]="hecha()">
              <label class="btn btn-outline-primary" for="hecha">La he hecho</label>
            </div>
          </div>
        </div>

        <!-- COLUMNA DERECHA -->
        @if(hecha()) {
        <div
          class="col-md-5 d-flex flex-column align-items-center justify-content-center ps-md-4 animate__animated animate__fadeIn">
          <label class="form-label fw-bold mb-3">
            <i class="bi bi-star-fill me-1 text-warning"></i> Tu Valoración
          </label>

          <div class="rating-stars" (change)="onChangeRating($event)">
            <input [checked]="puntuacion() == 5" type="radio" name="rating" id="star5" value="5"><label for="star5"
              class="bi bi-star-fill"></label>
            <input [checked]="puntuacion() == 4" type="radio" name="rating" id="star4" value="4"><label for="star4"
              class="bi bi-star-fill"></label>
            <input [checked]="puntuacion() == 3" type="radio" name="rating" id="star2" value="2"><label for="star2"
              class="bi bi-star-fill"></label>
            <input [checked]="puntuacion() == 2" type="radio" name="rating" id="star3" value="3"><label for="star3"
              class="bi bi-star-fill"></label>
            <input [checked]="puntuacion() == 1" type="radio" name="rating" id="star1" value="1"><label for="star1"
              class="bi bi-star-fill"></label>
          </div>

          <p class="text-muted small mt-2">Haz clic para puntuar</p>
        </div>
        }
      </div>

      <hr class="my-4">

      <div class="d-flex gap-2 justify-content-end">
        <button (click)="onCancel()" class="btn btn-light px-4 border">Cancelar</button>
        <button (click)="onSaveChanges()" class="btn btn-primary px-4 shadow-sm">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>
