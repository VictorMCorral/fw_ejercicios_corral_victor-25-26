<div class="card shadow-sm border-0" style="border-radius: 15px;">
  <!-- Cabecera de la Tabla -->
  <div class="card-header bg-white border-0 pt-4 px-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <h3 class="h5 fw-bold text-primary mb-1">
          <i class="bi bi-calendar3 me-2"></i>Planes Semanales Guardados
        </h3>
        <p class="text-muted small mb-0">Consulta y gestiona tu organización de comidas</p>
      </div>

      <!-- Selector Estilizado -->
      <div class="d-flex align-items-center gap-2">
        <label class="small fw-bold text-secondary text-nowrap">Semana:</label>
        <select class="form-select border-0 shadow-sm bg-light" style="width: 220px; border-radius: 10px;">
          <option selected>W20 (Semana Actual)</option>
          <option>W19 (Anterior)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card-body p-4">
    <!-- Contenedor de Tabla con Scroll suave -->
    <div class="table-responsive rounded-3 border">
      <table class="table table-bordered align-middle text-center mb-0 plan-table">
        <!-- Cabecera de días -->
        <thead class="bg-light">
          <tr>
            <th colspan="7" class="py-3 fw-bold text-dark border-bottom-0">
               Semana W20
            </th>
          </tr>
          <tr class="text-secondary small uppercase">
            <th class="py-2 border-top-0">Lunes</th>
            <th class="py-2 border-top-0">Martes</th>
            <th class="py-2 border-top-0">Miércoles</th>
            <th class="py-2 border-top-0">Jueves</th>
            <th class="py-2 border-top-0">Viernes</th>
            <th class="py-2 border-top-0">Sábado</th>
            <th class="py-2 border-top-0">Domingo</th>
          </tr>
        </thead>

        <tbody>
          <!-- Fila Mañana -->
          <tr>
            <td>
              <span class="d-block mb-2 fw-bold text-secondary small">Mañana</span>
              <!-- Ejemplo de contenido si hubiera receta -->
              <!-- <div class="placeholder-recipe p-2 rounded-3 border border-dashed text-muted small">
                Sin receta
              </div> -->
            </td>
            <td class="py-4"><span class="text-light-emphasis small">Mañana</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Mañana</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Mañana</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Mañana</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Mañana</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Mañana</span></td>
          </tr>

          <!-- Fila Noche -->
          <tr>
            <td>
              <span class="d-block mb-2 fw-bold text-secondary small">Noche</span>
              <!-- <div class="placeholder-recipe p-2 rounded-3 border border-dashed text-muted small">
                Sin receta
              </div> -->
            </td>
            <td class="py-4"><span class="text-light-emphasis small">Noche</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Noche</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Noche</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Noche</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Noche</span></td>
            <td class="py-4"><span class="text-light-emphasis small">Noche</span></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pie de tabla: Botones de acción -->
    <div class="d-flex justify-content-end mt-4">
      <button class="btn btn-outline-danger btn-sm px-4 d-flex align-items-center gap-2 shadow-sm" style="border-radius: 10px; font-weight: 600;">
        <i class="bi bi-trash3"></i>
        Borrar Plan Completo
      </button>
    </div>
  </div>
</div>
