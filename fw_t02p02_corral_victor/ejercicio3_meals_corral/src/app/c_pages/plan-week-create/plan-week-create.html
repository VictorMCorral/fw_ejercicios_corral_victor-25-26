<div class="card shadow-sm border-0 mb-4" style="border-radius: 15px; background-color: #f8f9fa;">
  <div class="card-body p-4">
    <div class="row align-items-end g-3">

      <!-- Título de la sección -->
      <div class="col-12 mb-2">
        <h3 class="h5 fw-bold text-primary mb-0">
          <i class="bi bi-calendar-plus me-2"></i>Crear Nuevo Plan Semanal
        </h3>
        <p class="text-muted small mb-0">Selecciona el periodo para organizar tus comidas</p>
      </div>

      <!-- Input Año -->
      <div class="col-md-3">
        <label class="form-label small fw-bold text-secondary">Año</label>
        <input type="number" class="form-control border-0 shadow-sm" placeholder="2026" value="2026">
      </div>

      <!-- Selector de Semana -->
      <div class="col-md-5">
        <label class="form-label small fw-bold text-secondary">Semana</label>
        <select class="form-select border-0 shadow-sm">
          <option value="" disabled selected>Elige una semana...</option>
          <!-- Esto se llenaría con un @for en el TS -->
          <option value="20">W20</option>
          <option value="21">W21</option>
          <option value="22">W22</option>
          <option value="23">W23</option>
        </select>
      </div>

      <!-- Botón de Acción -->
      <div class="col-md-4">
        <button class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2 shadow-sm py-2"
          style="border-radius: 10px; font-weight: 600;">
          <i class="bi bi-plus-lg"></i>
          Generar Plan Semanal
        </button>
      </div>

    </div>
  </div>
</div>
