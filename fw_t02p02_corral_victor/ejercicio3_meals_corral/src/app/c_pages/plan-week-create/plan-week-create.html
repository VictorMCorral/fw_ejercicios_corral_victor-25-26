<div class="card shadow-sm border-0 mb-4" style="border-radius: 15px; background-color: #f8f9fa;">
  <div class="card-body p-4">
    <div class="row align-items-end g-3 mb-4">
      <!-- Título -->
      <div class="col-12 mb-2">
        <h3 class="h5 fw-bold text-primary mb-0">
          <i class="bi bi-calendar-plus me-2"></i>Configurar Nuevo Plan Semanal
        </h3>
      </div>

      <!-- Año -->
      <div class="col-md-3">
        <label class="form-label small fw-bold text-secondary">Año</label>
        <input type="number" class="form-control border-0 shadow-sm" [value]="yearSelected()"
          (input)="onYearChange($event)">
      </div>

      <!-- Semana -->
      <div class="col-md-5">
        <label class="form-label small fw-bold text-secondary">Semana</label>
        <select class="form-select border-0 shadow-sm" (change)="onWeekChange($event)" [value]="weekSelected()">
          <option value="" disabled>Elige una semana...</option>
          @for (week of listWeek(); track week) {
          <option [value]="week">Semana {{ week }}</option>
          }
        </select>
      </div>
    </div>

    <!-- TABLA DE LUNES A VIERNES -->
    <div class="table-responsive rounded-3 mb-4">
      <table class="table table-sm table-bordered bg-white align-middle text-center shadow-sm">
        <thead class="table-light">
          <tr>
            <th class="small">Comida</th>
            @for (dia of diasSemana; track dia) {
            <th class="text-capitalize small">{{dia}}</th>
            }
          </tr>
        </thead>
        <tbody>
          <!-- Fila Almuerzos -->
          <tr>
            <td class="fw-bold text-secondary small">Mañana</td>
            @for (dia of diasSemana; track dia) {
            <td>
              <select class="form-select form-select-sm border-0 bg-light"
                (change)="onMealSelected(dia, 'lunch', $event)">
                <option value="">-- Sin asignar --</option>
                @for (meal of userRecipes(); track meal.idMeal) {
                <option [value]="meal.idMeal">{{ meal.strMeal }}</option>
                }
              </select>
            </td>
            }
          </tr>
          <!-- Fila Cenas -->
          <tr>
            <td class="fw-bold text-secondary small">Noche</td>
            @for (dia of diasSemana; track dia) {
            <td>
              <select class="form-select form-select-sm border-0 bg-light"
                (change)="onMealSelected(dia, 'dinner', $event)">
                <option value="">-- Sin asignar --</option>
                @for (meal of userRecipes(); track meal.idMeal) {
                <option [value]="meal.idMeal">{{ meal.strMeal }}</option>
                }
              </select>
            </td>
            }
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Botón de Acción -->
    <div class="row">
      <div class="col-md-4 ms-auto">
        <button (click)="onCreatePlan()" [disabled]="!weekSelected()"
          class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2 shadow-sm py-2"
          style="border-radius: 10px; font-weight: 600;">
          <i class="bi bi-save"></i>
          Guardar y Generar Plan
        </button>
      </div>
    </div>
  </div>
</div>
