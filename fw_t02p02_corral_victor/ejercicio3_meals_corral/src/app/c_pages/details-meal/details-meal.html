<div class="container mt-5">
  <div class="card border-0 shadow-lg overflow-hidden" id="recipe-container">
    <div class="row g-0">

      <!-- Columna de la Imagen con efecto -->
      <div class="col-md-6 position-relative">
        <img class="img-fluid h-100 object-fit-cover" [src]="recetaSeleccionada()?.strMealThumb"
          alt="Imagen de la receta" style="min-height: 400px; width: 100%;" />
        <div class="recipe-overlay"></div>
      </div>

      <!-- Columna de Información -->
      <div class="col-md-6 p-4 p-lg-5 d-flex flex-column justify-content-center">

        <!-- Título de la Receta (Añadido) -->
        <h2 class="display-6 fw-bold mb-3">{{ recetaSeleccionada()?.strMeal }}</h2>

        <div class="d-flex gap-2 mb-4">
          <span class="badge rounded-pill bg-primary-subtle text-primary px-3 py-2 border border-primary">
            <i class="bi bi-tag-fill me-1"></i> {{ recetaSeleccionada()?.strCategory }}
          </span>
          <span class="badge rounded-pill bg-secondary-subtle text-secondary px-3 py-2 border border-secondary">
            <i class="bi bi-geo-alt-fill me-1"></i> {{ recetaSeleccionada()?.strArea }}
          </span>
        </div>

        <h4 class="fw-bold mb-3 border-bottom pb-2">Ingredientes</h4>

        <div class="ingredients-scroll mb-4" style="max-height: 300px; overflow-y: auto;">
          <ul class="list-group list-group-flush">
            @for (ingrediente of recetaSeleccionada()?.ingredients; track ingrediente.name) {
            <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent px-0">
              <span class="fw-medium text-dark">{{ ingrediente.name }}</span>
              <span class="badge bg-light text-muted border fw-normal">{{ ingrediente.measure }}</span>
            </li>
            }
          </ul>
        </div>

        <!-- Botones de Acción -->
        <div class="d-flex gap-2 mt-auto">
          <button class="btn btn-primary btn-lg w-100 shadow-sm transition-all" type="button" id="btnGuardarReceta">
            <i class="bi bi-bookmark-heart me-2"></i> Guardar
          </button>
          <!--TODO FILTRAR SI ESTA REGISTRADO-->
          <button class="btn btn-outline-danger btn-lg w-100 transition-all" type="button"
            id="btnEliminarReceta">
            <i class="bi bi-trash me-2"></i> Eliminar
          </button>

        </div>

      </div>
    </div>
  </div>
</div>
